# Desktop Scoreboard Configuration

# MQTT Configuration
mqtt:
  broker_host: localhost
  broker_port: 1883
  client_id: scoreboard
  username: null  # Set to username if authentication required
  password: null  # Set to password if authentication required
  subscriptions:
    - scoreboard/data
    - scoreboard/text
    - scoreboard/control

# LED Matrix Configuration
matrix:
  width: 64
  height: 32
  brightness: 99
  gpio_slowdown: 10
  hardware_mapping: regular  # Regular GPIO mapping
  chain_length: 4
  parallel: 1
  led_rgb_sequence: RBG
  title_text: PURCELL  # Header above center clock in scoreboard data view

# Display Configuration
display:
  default_text_color: [255, 0, 0]  # RGB red
  default_bg_color: [0, 0, 0]      # RGB black

# Application Configuration
app:
  log_level: INFO
  mock_hardware: false  # Set to true to test without hardware
  main_loop_sleep_seconds: 0.005  # Lower for faster animation updates

# Mode Management
modes:
  default_mode: scoreboard  # scoreboard | clock | rss | cubs

# Clock Display Configuration
clock:
  enabled: true
  format: "%H:%M:%S"
  color: [255, 255, 0]  # Clock font/text color (RGB)
  font_size: 30  # Clock font size in pixels; adjust for readability/layout
  idle_after_seconds: 60  # Hold MQTT text/data this many seconds before clock returns
  weather:
    enabled: true
    latitude: 41.7056   # Notre Dame, IN
    longitude: -86.2353
    unit: F
    color: [0, 102, 255]  # Temperature text color (blue)
    refresh_seconds: 600  # Re-fetch every 10 minutes
    timeout_seconds: 2.5

# RSS Ticker Mode
rss:
  feed_url: https://www.espn.com/espn/rss/news
  refresh_seconds: 300
  timeout_seconds: 4.0
  scroll_step: 1
  frame_interval_seconds: 0.01
  scroll_pixels_per_second: 100  # Explicit speed target; higher is faster
  max_elapsed_factor: 2.0  # Caps catch-up jumps if the process is briefly delayed
  ticker_gap: 24
  color: [255, 255, 255]
  font_size: 20
  fallback_text: "RSS: waiting for headlines"

# Cubs Live Game Mode (MLB Stats API)
cubs:
  team_id: 112  # Chicago Cubs
  refresh_seconds: 15
  timeout_seconds: 4.0
  off_day_text: "No Cubs Game Today"
  show_when_final: true
